name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      # Standardization gate: every shipped sample board must pass the
      # schema + composition-quality budget under --strict.
      - name: Validate sample boards
        run: |
          for f in fixtures/hansol-sample.json fixtures/generic-sample.json fixtures/gov-sample.json; do
            node scripts/board.mjs validate "$f" --strict
          done
